<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../mystylesheet.css">
</head>
<body>
    <div id = "header">
        <h1>Pizza Order Form</h1>
    </div>
    <h3>Information</h3>
    Name: <input type="text" name="name" id="name">
    <br>
    Address <input type="text" name="address" id="address">
    <br>
    Phone Number <input type="text" name="phonenumber" id="phonenumber">

    <h3>Pizza Options</h3>

    <h4>Sizes</h4>
    <input type="radio" name="size" id="small">
    <label for="small"> S</label>
    <br>
    <input type="radio" name="size" id="medium">
    <label for="medium"> M</label>
    <br>
    <input type="radio" name="size" id="Large">
    <label for="Large"> L</label>
    <br>
    <input type="radio" name="size" id="extralarge">
    <label for="extralarge"> XL</label>

        <h4>Toppings</h4>
    <input type="checkbox" name="cheese" id="cheese">
    <label for="cheese"> Cheese</label>
    <br>
    <input type="checkbox" name="pepperoni" id="pepperoni">
    <label for="pepperoni"> Pepperoni </label>
    <br>
    <input type="checkbox" name="mushroom" id="mushroom">
    <label for="mushroom"> Mushroom</label>
    <br>
    <input type="checkbox" name="sausage" id="sausage">
    <label for="sausage"> Sausage</label>
    <br>
    <input type="checkbox" name="bacon" id="bacon">
    <label for="bacon"> Bacon</label>

    <h4>Notes</h4>
    <textarea name="notes" id="notes" cols="30" rows="10"></textarea>

    <input type="submit" value="Submit">
</body>
</html>
